<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ElitePOS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/lib/jspdf.min.js"></script>
    <script src="js/lib/autotable.min.js"></script>
</head>
<body>
    <header>
        <h1>ElitePOS</h1>
        <small id="info-turno">Verificando sesión...</small>
    </header>

    <div class="contenedor">
        <div class="grid-productos" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
            <div class="card-producto" onclick="location.href='venta.html'" style="cursor:pointer; background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                <div style="font-size:3rem;">🛒</div>
                <h3>Ventas</h3>
            </div>
            <div class="card-producto" onclick="location.href='productos.html'" style="cursor:pointer; background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                <div style="font-size:3rem;">📦</div>
                <h3>Inventario</h3>
            </div>
            <div class="card-producto" onclick="location.href='reporte.html'" style="cursor:pointer; background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                <div style="font-size:3rem;">📊</div>
                <h3>Reportes</h3>
            </div>
            <div class="card-producto" onclick="realizarCorteCaja()" style="cursor:pointer; background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); border-left:5px solid #e74c3c;">
                <div style="font-size:3rem;">🚪</div>
                <h3>Cerrar Turno</h3>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/corte.js"></script>

    <script>
    window.onload = function() {
        setTimeout(() => {
            const datosRaw = localStorage.getItem("turno_activo");
            
            if (!datosRaw) {
                console.log("Sesión no encontrada, redirigiendo...");
                window.location.replace("login.html");
            } else {
                const datos = JSON.parse(datosRaw);
                document.getElementById("info-turno").innerText = 
                    `Turno: ${datos.usuario} | Caja Inicial: $${datos.cajaInicial}`;
                console.log("Sesión activa confirmada ✅");
            }
        }, 200); 
    };
    </script>
</body>
</html>
