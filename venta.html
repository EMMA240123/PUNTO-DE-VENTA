<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta - ElitePOS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header style="display: flex; flex-direction: column; align-items: center; padding: 15px 20px; background: var(--oscuro); color: white;">
        <h1 style="margin: 0;">ElitePOS - Ventas</h1>
        
        <button onclick="location.href='dashboard.html'" 
                style="margin-top: 10px; background: #3498db; color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            🏠 Volver al Inicio
        </button>
    </header>

    <div class="contenedor">
        <div style="margin: 20px 0; text-align: center;">
            <input type="text" id="input-buscador" onkeyup="filtrarProductos()" 
                   placeholder="🔍 Buscar producto por nombre..." 
                   style="width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #ccc; font-size: 1rem; outline: none;">
        </div>

        <div id="lista-productos" class="grid-productos" style="padding-bottom: 220px;">
            </div>
    </div>

    <div class="footer-cart" style="flex-direction: column; padding: 10px 15px; background: white; border-top: 2px solid #eee; position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; box-sizing: border-box; gap: 5px;">
        
        <div id="detalle-carrito" style="width: 100%; max-height: 100px; overflow-y: auto; background: #f9f9f9; border-radius: 8px; padding: 8px; border: 1px solid #ddd; margin-bottom: 5px;">
            <p style="margin: 0; font-size: 0.8rem; color: #999; text-align: center;">Carrito vacío 🛒</p>
        </div>

        <div style="display: flex; width: 100%; justify-content: space-around; align-items: center; gap: 10px;">
            <div style="flex: 1; max-width: 300px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <span style="font-weight: bold;">Total:</span>
                    <span id="total-txt" style="font-size: 1.6rem; font-weight: bold; color: #2c3e50;">$0.00</span>
                </div>
                
                <div style="margin-bottom: 8px;">
                    <select id="metodo-pago" onchange="ajustarInterfazPago()" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #27ae60; background: #f9f9f9; font-weight: bold; color: #2c3e50; font-size: 0.9rem;">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📲 Transferencia</option>
                        <option value="Tarjeta">💳 Tarjeta</option>
                    </select>
                </div>

                <div id="seccion-cambio" style="background: #f1f2f6; padding: 8px; border-radius: 8px;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label style="font-size: 0.8rem; color: #666; white-space: nowrap;">Paga con:</label>
                        <input type="number" id="paga-con" onkeyup="calcularCambio()" placeholder="$0.00" 
                               style="width: 100%; font-size: 1rem; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <h3 style="color: #e67e22; margin: 5px 0 0 0; font-size: 0.9rem; text-align: right;">Cambio: $<span id="cambio-txt">0.00</span></h3>
                </div>
            </div>
            
            <button class="btn-cobrar" onclick="finalizarVenta()" 
                    style="height: 110px; width: 120px; font-size: 1.1rem; background: #27ae60; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                COBRAR
            </button>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/ventas.js"></script>
    <script>
        function ajustarInterfazPago() {
            const metodo = document.getElementById('metodo-pago').value;
            const seccionCambio = document.getElementById('seccion-cambio');
            const inputPagaCon = document.getElementById('paga-con');
            
            if (metodo !== 'Efectivo') {
                seccionCambio.style.opacity = "0.5";
                inputPagaCon.disabled = true;
                inputPagaCon.value = document.getElementById('total-txt').innerText.replace('$', '');
                document.getElementById('cambio-txt').innerText = "0.00";
            } else {
                seccionCambio.style.opacity = "1";
                inputPagaCon.disabled = false;
                inputPagaCon.value = "";
            }
        }
    </script>
</body>
</html>
