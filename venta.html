<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta - ElitePOS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header style="display: flex; flex-direction: column; align-items: center; padding: 15px 20px; background: var(--oscuro); color: white;">
        <h1 style="margin: 0;">ElitePOS - Ventas</h1>
        
        <button onclick="location.href='dashboard.html'" 
                style="margin-top: 10px; background: #3498db; color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            🏠 Volver al Inicio
        </button>
    </header>

    <div class="contenedor">
        <div style="margin: 20px 0; text-align: center;">
            <input type="text" id="input-buscador" onkeyup="filtrarProductos()" 
                   placeholder="🔍 Buscar producto por nombre..." 
                   style="width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #ccc; font-size: 1rem; outline: none;">
        </div>

        <div id="lista-productos" class="grid-productos">
            </div>
    </div>

    <div class="footer-cart" style="padding: 15px; background: white; border-top: 2px solid #eee; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center;">
        <div style="flex: 1; max-width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Total:</span>
                <span id="total-txt" style="font-size: 1.8rem; font-weight: bold; color: #2c3e50;">$0.00</span>
            </div>
            
            <div style="background: #f1f2f6; padding: 10px; border-radius: 8px; margin-top: 5px;">
                <label style="font-size: 0.9rem; color: #666;">Paga con:</label>
                <input type="number" id="paga-con" onkeyup="calcularCambio()" placeholder="$0.00" 
                       style="width: 100%; font-size: 1.1rem; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                <h3 style="color: #e67e22; margin: 5px 0 0 0; font-size: 1rem;">Cambio: $<span id="cambio-txt">0.00</span></h3>
            </div>
        </div>
        
        <button class="btn-cobrar" onclick="finalizarVenta()" 
                style="height: 80px; width: 150px; font-size: 1.2rem; background: #27ae60; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">
            COBRAR
        </button>
    </div>

    <script src="js/db.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
