<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ElitePOS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:var(--gris-luz);">
    <div class="contenedor" style="max-width:400px; margin: 50px auto;">
        <div style="text-align:center; margin-bottom:30px;">
            <h1 style="color:var(--oscuro);">ElitePOS</h1>
            <p>Control de Acceso</p>
        </div>
        <div class="card-producto" style="text-align:left; padding:25px;">
            <label>Seleccionar Turno</label>
            <select id="usuario" style="width:100%; padding:12px; margin:10px 0; border-radius:8px;">
                <option value="Matutino">Matutino</option>
                <option value="Vespertino">Vespertino</option>
                <option value="Nocturno">Nocturno</option>
            </select>
            <label>Dinero Inicial en Caja</label>
            <input type="number" id="cajaInicial" placeholder="$0.00" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <button class="btn-add" onclick="iniciarTurno()" style="margin-top:20px;">ABRIR CAJA</button>
        </div>
    </div>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
